<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
    <script src="rps.js" defer></script>
    <style>
        .buttons button {
            font-size: 48px;
            font-family: monospace;
            font-weight: 900;
        }
    </style>

</head>
<body>
    <div class="buttons">
        <input type="button" name="rps" value="Rock" onclick="playGame('rock');">
        <input type="button" name="rps" value="Paper" onclick="playGame('paper');">
        <input type="button" name="rps" value="Scissors" onclick="playGame('scissors');">
    </div>
</body>
</html>
